<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyForge — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0C;--bg2:#111116;--bg3:#1A1A22;
  --border:#252530;--border2:#353545;
  --text:#F0F0F8;--muted:#8888A0;--hint:#4A4A60;
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.07);--amber-glow:rgba(245,166,35,0.15);
  --green:#10B981;--red:#EF4444;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
html{font-size:14px}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* Animated grid background */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{from{background-position:0 0}to{background-position:40px 40px}}

/* Glow orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb-1{width:400px;height:400px;background:rgba(245,166,35,0.06);top:-100px;left:-100px;animation:float1 8s ease-in-out infinite}
.orb-2{width:300px;height:300px;background:rgba(124,58,237,0.05);bottom:-50px;right:-50px;animation:float2 10s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}

.login-wrap{
  width:100%;max-width:420px;padding:24px;
  position:relative;z-index:10;
  animation:appear 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes appear{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Logo */
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:40px}
.logo-mark{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#F5A623,#E08A10);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:15px;color:#0A0A0C;
  box-shadow:0 0 20px rgba(245,166,35,0.3);
}
.logo-name{font-size:24px;font-weight:700;letter-spacing:-0.5px}
.logo-name b{color:var(--amber)}

/* Card */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.02),0 24px 48px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,166,35,0.03) 0%,transparent 60%);
  pointer-events:none;
}

.card-head{margin-bottom:28px;position:relative}
.card-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px}
.card-sub{font-size:13px;color:var(--muted);line-height:1.5}

/* Form */
.field{margin-bottom:20px;position:relative}
.label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:0.7px;
  margin-bottom:8px;
}
.label-icon{font-size:13px}
.input-wrap{position:relative}
.input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:12px;padding:13px 16px;
  color:var(--text);font-size:14px;font-family:var(--sans);
  outline:none;transition:all 0.2s;
  position:relative;z-index:1;
}
.input:focus{
  border-color:var(--amber);
  box-shadow:0 0 0 3px var(--amber-dim),0 0 12px var(--amber-glow);
}
.input::placeholder{color:var(--hint)}
.input-prefix{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:12px;color:var(--hint);z-index:2;pointer-events:none;
}
.has-prefix .input{padding-left:40px}

/* Error */
.error{
  display:flex;align-items:center;gap:8px;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:10px;padding:10px 14px;
  color:#EF4444;font-size:13px;margin-bottom:20px;
}

/* Button */
.btn-submit{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#F5A623,#E08A10);
  color:#0A0A0C;font-size:14px;font-weight:700;font-family:var(--sans);
  cursor:pointer;transition:all 0.2s;margin-top:4px;
  letter-spacing:0.3px;position:relative;overflow:hidden;
}
.btn-submit::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,166,35,0.35)}
.btn-submit:active{transform:scale(0.98)}

/* Hint box */
.hint-box{
  margin-top:20px;padding:12px 16px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;font-family:var(--mono);font-size:11px;
  color:var(--hint);line-height:2;
}
.hint-box .key{color:var(--amber)}
.hint-box .val{color:var(--muted)}

.footer{margin-top:24px;text-align:center;font-size:11px;color:var(--hint)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-mark">Py</div>
    <div class="logo-name">Py<b>Forge</b></div>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="card-title">Добро пожаловать</div>
      <div class="card-sub">Войдите в платформу, чтобы продолжить</div>
    </div>

    {% if error %}
    <div class="error">
      <span>✗</span> {{ error }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <div class="label"><span class="label-icon">◈</span> Логин</div>
        <div class="input-wrap has-prefix">
          <span class="input-prefix">$</span>
          <input class="input" type="text" name="username"
            placeholder="username" autocomplete="username" autofocus
            value="{{ request.POST.username|default:'' }}">
        </div>
      </div>

      <div class="field">
        <div class="label"><span class="label-icon">◈</span> Пароль</div>
        <div class="input-wrap has-prefix">
          <span class="input-prefix">*</span>
          <input class="input" type="password" name="password"
            placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-submit">Войти в платформу →</button>
    </form>

    <div class="hint-box">
      <span class="key"># Ученики:</span> <span class="val">логин и пароль выдаёт учитель</span><br>
      <span class="key"># Учителя:</span> <span class="val">используйте admin-аккаунт</span>
    </div>
  </div>

  <div class="footer">PyForge · Образовательная платформа Python</div>
</div>
</body>
</html>
